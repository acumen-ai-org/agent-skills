<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Release candidate report</title>
<link rel="stylesheet" href="assets/app.css">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" integrity="sha384-/TQbtLCAerC3jgaim+N78RZSDYV7ryeoBCVqTuzRrFec2akfBkHS7ACQ3PQhvMVi" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" integrity="sha384-+VfUPEb0PdtChMwmBcBmykRMDd+v6D/oFmB3rZM/puCMDYcIvF968OimRh4KQY9a" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js" integrity="sha384-CjloA8y00+1SDAUkjs099PVfnY2KmDC2BZnws9kh8D/lX1s46w6EPhpXdqMfjK6i" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js" integrity="sha384-SM54CE5h+qdDI046d2Y5ym7wq1kq4uxcQ1cqGq5/+5jrE5tPLeDJSq711Q8sIska" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js" integrity="sha384-WmdflGW9aGfoBdHc4rRyWzYuAjEmDwMdGdiPNacbwfGKxBW/SO6guzuQ76qjnSlr" crossorigin="anonymous"></script>
<script id="report-data" type="application/json">{}</script>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <header id="release-header"></header>
    <div id="view-controls">
      <button id="toggle-split" type="button">Show/hide previous releases</button>
      <label id="module-filter" class="hidden">Module:
        <select id="module-select"></select>
      </label>
    </div>
    <nav id="nav"></nav>
  </aside>
  <main id="content">
    <section id="pane-current" class="pane"></section>
    <section id="pane-previous" class="pane hidden">
      <div id="previous-controls">
        <button id="prev-older" type="button" title="Older release">&#9664;</button>
        <span id="previous-label"></span>
        <button id="prev-newer" type="button" title="Newer release">&#9654;</button>
      </div>
      <div id="pane-previous-body"></div>
    </section>
  </main>
</div>
<div id="file-modal" class="modal-backdrop hidden">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <span id="file-modal-title"></span>
      <button id="file-modal-close" type="button" title="Close">&#10005;</button>
    </div>
    <div id="file-modal-body" class="modal-body"></div>
    <div id="file-modal-foot" class="modal-foot"></div>
  </div>
</div>
<script src="assets/app.js"></script>
</body>
</html>
